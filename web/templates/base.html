<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}카드 상품 모니터링{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115; --surface: #181b22; --surface-2: #20242e;
      --line: #2b3140; --text: #e7eaf0; --muted: #9aa3b2;
      --accent: #4c8dff; --new: #2ecc71; --disc: #ff6b6b;
      --radius: 12px; --sidebar-w: 240px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: "Malgun Gothic", "맑은 고딕", system-ui, sans-serif; line-height: 1.5;
    }
    .layout { display: flex; min-height: 100vh; align-items: stretch; }
    /* 좌측 사이드바 (카드사 구분) */
    aside.sidebar {
      width: var(--sidebar-w); flex: 0 0 var(--sidebar-w);
      background: linear-gradient(180deg, var(--surface) 0%, #14171d 100%);
      border-right: 1px solid var(--line); padding: 22px 14px; position: sticky; top: 0;
      height: 100vh; overflow-y: auto;
    }
    aside.sidebar .brand { font-size: 15px; font-weight: 700; padding: 0 10px 16px; letter-spacing: -0.3px; }
    aside.sidebar .nav-label {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; padding: 12px 10px 6px;
    }
    aside.sidebar a.item {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      text-decoration: none; color: var(--muted); font-size: 14px;
      padding: 9px 10px; border-radius: 8px; transition: all .12s;
    }
    aside.sidebar a.item:hover { color: var(--text); background: var(--surface-2); }
    aside.sidebar a.item.on { color: #fff; background: var(--accent); }
    aside.sidebar a.item .cnt {
      font-size: 12px; color: inherit; opacity: .75;
      background: rgba(255,255,255,.08); padding: 1px 7px; border-radius: 999px;
    }
    .main-wrap { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
    header.top {
      padding: 20px 28px; border-bottom: 1px solid var(--line);
      display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    }
    header.top h1 { font-size: 19px; margin: 0; letter-spacing: -0.3px; }
    header.top .sub { color: var(--muted); font-size: 13px; }
    main { padding: 24px 28px 60px; }
    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      aside.sidebar { width: auto; height: auto; position: static; flex-basis: auto; }
    }
    {% block style %}{% endblock %}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">카드 모니터링</div>
      {% block sidebar %}{% endblock %}
    </aside>
    <div class="main-wrap">
      <header class="top">
        <h1>카드사 신규 상품 모니터링</h1>
        <span class="sub">{% block subtitle %}{% endblock %}</span>
      </header>
      <main>{% block content %}{% endblock %}</main>
    </div>
  </div>
</body>
</html>
