name: 카드 모니터링 (자동 수집 + Teams 알림 + Pages)

# 매일 약 09:25 KST(00:25 UTC) 자동 실행 + 수동 실행 버튼(Actions 탭)
# 주의: 정각(특히 00:00 UTC)은 전 세계 cron이 몰려 GitHub가 best-effort로
# 지연·드롭하는 가장 혼잡한 슬롯이라, 정각을 피해 25분으로 둔다.
on:
  schedule:
    - cron: "25 0 * * *"
  workflow_dispatch:
  # main 푸시 시에도 실행하되, 수집(스크래핑)은 건너뛰고 커밋된 cards.db로
  # export+배포만 수행 → 코드/데이터 수정이 즉시 라이브 대시보드에 반영된다.
  push:
    branches: [main]

# cards.db 커밋(상태 유지) + GitHub Pages 배포 권한
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: card-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright 설치(수집용)
        if: github.event_name != 'push'  # export 전용 push 배포엔 불필요
        run: python -m playwright install --with-deps chromium

      - name: 수집 + 신규 시 Teams 알림
        if: github.event_name != 'push'  # push는 배포만(수집 생략)
        env:
          # 저장소 Settings > Secrets 에 등록한 값(없으면 알림만 skip)
          CARD_TEAMS_WEBHOOK_URL: ${{ secrets.CARD_TEAMS_WEBHOOK_URL }}
        run: python main.py --mode collect

      - name: 정적 대시보드 생성
        run: python main.py --mode export

      - name: 상태(cards.db) 커밋  # first_seen 유지 → 다음 실행에서 신규 감지
        if: github.event_name != 'push'  # push 이벤트는 커밋 생략(무한 트리거 방지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f storage/cards.db
          git commit -m "chore: update card state ($(date -u +%Y-%m-%d))" || echo "변경 없음"
          git push || echo "push 생략"

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4
